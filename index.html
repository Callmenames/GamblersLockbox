<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dice Lockbox Creator</title>

<style>
*{
    box-sizing:border-box;
}

body{
    background:#111;
    color:white;
    font-family:Arial,Helvetica,sans-serif;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

.card{
    background:#1c1c1c;
    border-radius:12px;
    padding:20px;
}

h1,h2{
    margin-bottom:15px;
}

label{
    display:block;
    margin-top:10px;
    margin-bottom:5px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    margin-bottom:10px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#00b894;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#00a383;
}

#output{
    margin-top:20px;
}

textarea{
    width:100%;
    height:150px;
    padding:10px;
    border:none;
    border-radius:8px;
}
</style>
</head>
<body>

<div class="container">
<div class="card">

<h1>Dice Lockbox Creator</h1>

<h2>Cover Asset</h2>
<label>Cover Image URL</label>
<input id="coverImage">

<label>Starting Coin Value</label>
<input id="coverValue" type="number">

<h2>Stage 1 Asset</h2>
<label>Image URL</label>
<input id="stage1Image">

<label>Coin Value</label>
<input id="stage1Value" type="number">

<h2>Stage 2 Asset</h2>
<label>Image URL</label>
<input id="stage2Image">

<label>Coin Value</label>
<input id="stage2Value" type="number">

<h2>Stage 3 Asset</h2>
<label>Image URL</label>
<input id="stage3Image">

<label>Coin Value</label>
<input id="stage3Value" type="number">

<h2>Stage 4 Asset</h2>
<label>Image URL</label>
<input id="stage4Image">

<label>Coin Value</label>
<input id="stage4Value" type="number">

<h2>Stage 5 Asset</h2>
<label>Image URL</label>
<input id="stage5Image">

<label>Coin Value</label>
<input id="stage5Value" type="number">

<h2>Bonus Reward</h2>
<label>Bonus Image URL</label>
<input id="bonusImage">

<br>

<button onclick="generateLink()">
Generate Lockbox Link
</button>

<div id="output"></div>

</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>

<script>

function generateLink(){

    const data = {

        cover:{
            image:document.getElementById("coverImage").value,
            value:Number(document.getElementById("coverValue").value)
        },

        assets:[

            {
                image:document.getElementById("stage1Image").value,
                value:Number(document.getElementById("stage1Value").value)
            },

            {
                image:document.getElementById("stage2Image").value,
                value:Number(document.getElementById("stage2Value").value)
            },

            {
                image:document.getElementById("stage3Image").value,
                value:Number(document.getElementById("stage3Value").value)
            },

            {
                image:document.getElementById("stage4Image").value,
                value:Number(document.getElementById("stage4Value").value)
            },

            {
                image:document.getElementById("stage5Image").value,
                value:Number(document.getElementById("stage5Value").value)
            }

        ],

        bonus:document.getElementById("bonusImage").value

    };

    const compressed =
        LZString.compressToEncodedURIComponent(
            JSON.stringify(data)
        );

    const url =
        window.location.origin +
        window.location.pathname.replace(
            /[^/]*$/,
            "play.html"
        ) +
        "#" +
        compressed;

    document.getElementById("output").innerHTML = `
        <h2>Share Link</h2>

        <textarea id="generatedLink">${url}</textarea>

        <button onclick="copyLink()">
            Copy Link
        </button>
    `;
}

function copyLink(){

    const text =
        document.getElementById(
            "generatedLink"
        ).value;

    navigator.clipboard.writeText(text);

    alert("Link copied!");
}

</script>

</body>
</html>
