<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dice Lockbox Creator</title>

<style>

*{
    box-sizing:border-box;
}

body{
    background:#111;
    color:white;
    font-family:Arial,Helvetica,sans-serif;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

.card{
    background:#1c1c1c;
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
}

h1,h2{
    margin-bottom:15px;
}

label{
    display:block;
    margin-top:10px;
    margin-bottom:5px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    margin-bottom:10px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#00b894;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#00a383;
}

#output{
    margin-top:20px;
    word-break:break-all;
}

textarea{
    width:100%;
    height:140px;
    padding:10px;
}

</style>
</head>
<body>

<div class="container">

<div class="card">

<h1>Dice Lockbox Creator</h1>

<h2>Cover Asset</h2>

<label>Cover Image URL</label>
<input id="coverImage">

<label>Starting Coin Value</label>
<input id="coverValue" type="number">

<h2>Stage 1 Asset</h2>

<label>Image URL</label>
<input id="stage1Image">

<label>Coin Value</label>
<input id="stage1Value" type="number">

<h2>Stage 2 Asset</h2>

<label>Image URL</label>
<input id="stage2Image">

<label>Coin Value</label>
<input id="stage2Value" type="number">

<h2>Stage 3 Asset</h2>

<label>Image URL</label>
<input id="stage3Image">

<label>Coin Value</label>
<input id="stage3Value" type="number">

<h2>Stage 4 Asset</h2>

<label>Image URL</label>
<input id="stage4Image">

<label>Coin Value</label>
<input id="stage4Value" type="number">

<h2>Stage 5 Asset</h2>

<label>Image URL</label>
<input id="stage5Image">

<label>Coin Value</label>
<input id="stage5Value" type="number">

<h2>Bonus Reward</h2>

<label>Bonus Image URL</label>
<input id="bonusImage">

<br><br>

<button onclick="generateLink()">
Generate Lockbox Link
</button>

<div id="output"></div>

</div>

</div>
