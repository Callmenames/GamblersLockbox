<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dice Lockbox</title>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#111;
    color:white;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

.hidden{
    display:none;
}

.card{
    background:#1c1c1c;
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
}

.center{
    text-align:center;
}

img{
    max-width:100%;
    border-radius:10px;
}

.coins{
    font-size:24px;
    font-weight:bold;
    text-align:center;
    margin:15px 0;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:18px;
    margin-top:10px;
}

.primary{
    background:#00b894;
    color:white;
}

.primary:hover{
    background:#00a383;
}

.secondary{
    background:#444;
    color:white;
}

.secondary:hover{
    background:#555;
}

.dice{
    font-size:80px;
    text-align:center;
    margin:20px 0;
}

.subtitle{
    text-align:center;
    font-size:22px;
    margin-bottom:15px;
}

.resultText{
    text-align:center;
    font-size:24px;
    margin-top:20px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:10px;
    margin-top:20px;
}

.gallery img{
    height:220px;
    object-fit:cover;
}

</style>
</head>
<body>

<div class="container">

<!-- LOADING -->

<div id="loading"
     class="card center">

    Loading...

</div>

<!-- COVER -->

<div id="coverScreen"
     class="card center hidden">

    <h1>Dice Lockbox</h1>

    <img id="coverImage">

    <br><br>

    <button
        class="primary"
        onclick="startGame()">

        Start

    </button>

</div>

<!-- MAIN GAME -->

<div id="gameScreen"
     class="hidden">

    <div class="card">

        <div class="coins">

            Your Coins:
            <span id="playerCoins"></span>

        </div>

        <div class="coins">

            <span id="opponentName">
                Opponent
            </span>

            Coins:

            <span id="computerCoins"></span>

        </div>

    </div>

    <!-- ROLL PHASE -->

    <div id="rollPhase"
         class="card center">

        <h2>Roll Your Dice</h2>

        <button
            class="primary"
            onclick="rollPlayerDice()">

            Roll

        </button>

    </div>

    <!-- DECISION PHASE -->

    <div id="decisionPhase"
         class="card hidden">

        <h2 class="center">
            Your Roll
        </h2>

        <div id="playerDice"
             class="dice">

        </div>

        <div class="center">
            Choose your move
        </div>

        <button
            class="secondary"
            onclick="foldRound()">

            Fold (-10)

        </button>

        <button
            class="primary"
            onclick="playRound(20)">

            Bet (-20)

        </button>

        <button
            class="primary"
            onclick="playRound(40)">

            Double (-40)

        </button>

    </div>

    <!-- ACQUIRED ASSETS -->

    <div class="card">

        <h2>
            Assets Acquired
        </h2>

        <div id="gallery"
             class="gallery">

        </div>

    </div>

</div>

<!-- RESULT SCREEN -->

<div id="resultScreen"
     class="card center hidden">

    <h2>Round Result</h2>

    <br>

    <h3>Your Roll</h3>

    <div id="resultPlayerDice"
         class="dice">

    </div>

    <h3 id="resultOpponentName">
        Opponent Roll
    </h3>

    <div id="resultComputerDice"
         class="dice">

    </div>

    <div id="resultMessage"
         class="resultText">

    </div>

    <button
        class="primary"
        onclick="nextRound()">

        Next

    </button>

</div>

<!-- ASSET REVEAL -->

<div id="assetReveal"
     class="card center hidden">

    <h2>
        Asset Acquired
    </h2>

    <br>

    <img id="soldImage">

    <br><br>

    <div id="soldValue"
         class="resultText">

    </div>

    <br>

    <button
        class="primary"
        onclick="continueGame()">

        Continue

    </button>

</div>

<!-- VICTORY -->

<div id="victoryScreen"
     class="card center hidden">

    <h1>
        You Win!
    </h1>

    <br>

    <h2>
        Bonus Reward
    </h2>

    <br>

    <img id="bonusImage">

    <br><br>

    <h2>
        Complete Collection
    </h2>

    <div id="finalGallery"
         class="gallery">

    </div>

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>

<script src="js/play.js"></script>

</body>
</html>
