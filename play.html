<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Gamblers Lockbox</title>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#111;
    color:white;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

.hidden{
    display:none;
}

.card{
    background:#1c1c1c;
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
}

.center{
    text-align:center;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:18px;
    margin-top:10px;
}

.primary{
    background:#00b894;
    color:white;
}

.primary:hover{
    background:#00a383;
}

.secondary{
    background:#444;
    color:white;
}

.secondary:hover{
    background:#555;
}

img{
    max-width:100%;
    border-radius:10px;
}

.dice{
    font-size:80px;
    text-align:center;
    margin:20px 0;
}

.coins{
    text-align:center;
    font-size:24px;
    margin:10px 0;
    font-weight:bold;
}

.gallery{
    display:grid;
    grid-template-columns:
        repeat(
            auto-fit,
            minmax(140px,1fr)
        );

    gap:10px;
    margin-top:20px;
}

.gallery img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.message{
    text-align:center;
    font-size:22px;
    margin-top:20px;
}

</style>
</head>
<body>

<div class="container">

<!-- Loading -->

<div
    id="loading"
    class="card center">

    Loading...

</div>

<!-- Cover -->

<div
    id="coverScreen"
    class="card center hidden">

    <h1>Gamblers Lockbox</h1>

    <br>

    <img id="coverImage">

    <br><br>

    <button
        class="primary"
        onclick="startGame()">

        Start Game

    </button>

</div>

<!-- Main Game -->

<div
    id="gameScreen"
    class="hidden">

    <div class="card">

        <div class="coins">

            Your Coins:
            <span id="playerCoins">
                100
            </span>

        </div>

        <div class="coins">

            <span id="opponentName">
                Opponent
            </span>

            Coins:

            <span id="computerCoins">
                100
            </span>

        </div>

    </div>

    <!-- Roll Phase -->

    <div
        id="rollPhase"
        class="card center">

        <h2>Roll Your Dice</h2>

        <br>

        <button
            class="primary"
            onclick="rollPlayerDice()">

            Roll Dice

        </button>

    </div>

    <!-- Decision Phase -->

    <div
        id="decisionPhase"
        class="card hidden">

        <h2 class="center">
            Your Roll
        </h2>

        <div
            id="playerDice"
            class="dice">

        </div>

        <button
            class="secondary"
            onclick="foldRound()">

            Fold (-10)

        </button>

        <button
            class="primary"
            onclick="playRound(20)">

            Bet (-20)

        </button>

        <button
            class="primary"
            onclick="playRound(40)">

            Double (-40)

        </button>

    </div>

    <!-- Acquired Pictures -->

    <div class="card">

        <h2>
            Pictures Acquired
        </h2>

        <div
            id="gallery"
            class="gallery">

        </div>

    </div>

</div>

<!-- Result Screen -->

<div
    id="resultScreen"
    class="card center hidden">

    <h2>
        Round Result
    </h2>

    <br>

    <h3>Your Roll</h3>

    <div
        id="resultPlayerDice"
        class="dice">

    </div>

    <h3
        id="resultOpponentName">

        Opponent Roll

    </h3>

    <div
        id="resultComputerDice"
        class="dice">

    </div>

    <div
        id="resultMessage"
        class="message">

    </div>

    <br>

    <button
        class="primary"
        onclick="nextRound()">

        Next Round

    </button>

</div>

<!-- Forced Sale -->

<div
    id="assetReveal"
    class="card center hidden">

    <h2>
        Forced Sale
    </h2>

    <br>

    <img id="soldImage">

    <br><br>

    <div
        id="soldValue"
        class="message">

    </div>

    <br>

    <button
        class="primary"
        onclick="continueGame()">

        Continue

    </button>

</div>

<!-- Victory -->

<div
    id="victoryScreen"
    class="card center hidden">

    <h1>
        You Win!
    </h1>

    <br>

    <h2>
        Bonus Reward
    </h2>

    <br>

    <img id="bonusImage">

    <br><br>

    <h2>
        Complete Collection
    </h2>

    <div
        id="finalGallery"
        class="gallery">

    </div>

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>

<script src="js/play.js"></script>

</body>
</html>
