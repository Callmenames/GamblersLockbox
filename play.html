<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dice Lockbox</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    padding:20px;
    margin:0;
}

.container{
    max-width:900px;
    margin:auto;
}

.card{
    background:#1c1c1c;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

.center{
    text-align:center;
}

.hidden{
    display:none;
}

img{
    max-width:100%;
    border-radius:10px;
}

button{
    background:#00b894;
    color:white;
    border:none;
    padding:15px 25px;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#00a383;
}

.coins{
    font-size:24px;
    margin:15px 0;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:10px;
    margin-top:20px;
}

.gallery img{
    width:100%;
    height:200px;
    object-fit:cover;
}

</style>
</head>
<body>

<div class="container">

<div id="loading" class="card center">
Loading...
</div>

<div id="coverScreen" class="card center hidden">

    <img id="coverImage">

    <br><br>

    <button onclick="startGame()">
        Start Game
    </button>

</div>

<div id="gameScreen" class="card center hidden">

    <div class="coins">
        Player Coins:
        <span id="playerCoins">100</span>
    </div>

    <div class="coins">
        Computer Coins:
        <span id="computerCoins">0</span>
    </div>

    <button onclick="rollDice()">
        Roll Dice
    </button>

    <div
        id="diceResult"
        style="margin-top:20px;font-size:20px;">
    </div>

    <div
        id="gallery"
        class="gallery">
    </div>

</div>

<div id="assetReveal" class="card center hidden">

    <h2>
        Computer Sold An Asset
    </h2>

    <img id="soldImage">

    <p id="soldValue"></p>

    <button onclick="continueGame()">
        Continue
    </button>

</div>

<div id="victoryScreen" class="card center hidden">

    <h1>
        You Win!
    </h1>

    <br>

    <img id="bonusImage">

    <h2>
        Complete Collection
    </h2>

    <div
        id="finalGallery"
        class="gallery">
    </div>

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
<script src="js/play.js"></script>

</body>
</html>
